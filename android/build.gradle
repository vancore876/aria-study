// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '34.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '23')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '34')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.23'

        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }

    subprojects {
        project.configurations.all {
            resolutionStrategy {
                force 'androidx.browser:browser:1.8.0'
                force 'androidx.activity:activity:1.9.3'
                force 'androidx.activity:activity-ktx:1.9.3'
                force 'androidx.activity:activity-compose:1.9.3'
                force 'androidx.core:core:1.13.1'
                force 'androidx.core:core-ktx:1.13.1'
                force 'androidx.lifecycle:lifecycle-runtime-compose:2.8.5'
                force 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.5'
                force 'androidx.navigation:navigation-compose:2.8.2'
                force 'androidx.transition:transition:1.5.0'
                force 'androidx.recyclerview:recyclerview:1.3.2'

                // Force compatible Compose versions to satisfy AGP 8.2.1
                force 'androidx.compose.ui:ui:1.7.5'
                force 'androidx.compose.ui:ui-graphics:1.7.5'
                force 'androidx.compose.ui:ui-text:1.7.5'
                force 'androidx.compose.runtime:runtime:1.7.5'
                force 'androidx.compose.runtime:runtime-saveable:1.7.5'
                force 'androidx.compose.foundation:foundation:1.7.5'
                force 'androidx.compose.foundation:foundation-layout:1.7.5'
                force 'androidx.compose.animation:animation:1.7.5'
                force 'androidx.compose.animation:animation-core:1.7.5'
                force 'androidx.compose.material:material:1.7.5'
                force 'androidx.compose.ui:ui-viewbinding:1.7.5'
                
                // Force Compose Compiler version
                force 'androidx.compose.compiler:compiler:1.5.8'
            }
        }
        if (project.hasProperty('android') && project.android.hasProperty('composeOptions')) {
            project.android.composeOptions.kotlinCompilerExtensionVersion = "1.5.8"
        }
    }
}

