<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA Admin Dashboard</title>
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div class="admin-container">
    <h1>📊 ARIA Admin Dashboard</h1>
    <div class="stats-grid">
      <div class="stat-card">
        <h2>Total Users</h2>
        <p id="total-users">0</p>
      </div>
      <div class="stat-card highlight">
        <h2>Active Now</h2>
        <p id="active-now">0</p>
      </div>
      <div class="stat-card">
        <h2>Active Today</h2>
        <p id="active-today">0</p>
      </div>
      <div class="stat-card highlight-green">
        <h2>Signups Today</h2>
        <p id="signups-today">0</p>
      </div>
      <div class="stat-card">
        <h2>Plus Subscribers</h2>
        <p id="plus-users">0</p>
      </div>
      <div class="stat-card">
        <h2>Pro Subscribers</h2>
        <p id="pro-users">0</p>
      </div>
      <div class="stat-card">
        <h2>Total Revenue</h2>
        <p id="total-revenue">$0</p>
      </div>
    </div>
  </div>
  <script src="../js/admin.js"></script>
</body>
</html>
