<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA Study Assistant</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="navbar">
      <div class="logo">ARIA Study</div>
      <nav class="nav-links">
        <a href="#features">Features</a>
        <a href="#pricing">Pricing</a>
      </nav>
    </header>

    <main>
      <section class="chat-container">
        <div class="chat-header">
          <h2>AI Study Assistant</h2>
          <div class="chat-buttons">
            <button class="chat-btn new-chat">New Chat</button>
            <button class="chat-btn clear">Clear</button>
          </div>
        </div>
        <div class="chat-window">
          <!-- Chat messages will appear here -->
        </div>
        <div class="input-area">
          <textarea placeholder="Ask about past papers, study strategies, or exam prep..."></textarea>
          <button class="send-btn">Send</button>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2024 ARIA Study | All rights reserved</p>
    </footer>
  </div>
</body>
</html>
